<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<title>Congregación Este, SF</title>
<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#0a0f1c"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Territorios"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="icon" href="icon-192.png"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --sheet:rgba(14,20,34,.86); --stroke:rgba(255,255,255,.12);
    --txt:#eaf0fb; --muted:#93a1bd; --accent:#5b8cff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;max-width:100%;background:#0a0f1c;color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;overflow:hidden;overflow-x:hidden}
  #map{position:fixed;inset:0;height:100dvh;width:100%;background:#0a0f1c}

  /* tinte midnight-blue solo sobre los tiles (grises de CARTO -> azul noche) */
  .leaflet-tile-pane{filter:brightness(1.06) contrast(1) sepia(.5) hue-rotate(188deg) saturate(1.8)}
  .leaflet-container{background:#0a0f1c}

  /* barra de titulo */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:800;display:flex;align-items:center;gap:9px;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background:linear-gradient(180deg,rgba(10,15,28,.92),rgba(10,15,28,0));pointer-events:none}
  .topbar .mk{width:22px;height:22px;border-radius:6px;flex:none;
    background:linear-gradient(135deg,#2e9e5b,#f4c020 55%,#d32f2f);box-shadow:0 0 12px rgba(91,140,255,.4)}
  .topbar h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px;text-shadow:0 1px 8px rgba(0,0,0,.6)}

  /* bottom sheet de controles */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:800;
    padding:14px 14px calc(env(safe-area-inset-bottom) + 14px);
    background:var(--sheet);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--stroke);border-radius:18px 18px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.5)}
  .seg{display:flex;background:rgba(255,255,255,.07);border-radius:12px;padding:4px;gap:4px}
  .seg button{flex:1;min-height:44px;border:0;background:transparent;color:var(--muted);
    border-radius:9px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s}
  .seg button.on{background:linear-gradient(135deg,#3b6ef0,#5b8cff);color:#fff;box-shadow:0 4px 14px rgba(59,110,240,.45)}

  .legend{margin-top:12px}
  .legwrap{display:flex;align-items:center;gap:10px}
  .bar{flex:1;height:12px;border-radius:7px;
    background:linear-gradient(90deg,#3a5f4f,#2e9e5b,#9ccc3c,#f4c020,#f57c00,#d32f2f)}
  .legend .ends{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}
  .rowlbls{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12.5px;color:var(--muted)}
  .rowlbls b{color:var(--txt);font-variant-numeric:tabular-nums}
  .note{font-size:11.5px;color:var(--muted);line-height:1.4;margin-top:10px}

  /* labels de numero de territorio */
  .tlabel{font-size:11px;font-weight:700;color:#eaf0fb;text-shadow:0 0 3px #000,0 0 3px #000;
    pointer-events:none;white-space:nowrap}

  /* popup */
  .leaflet-popup-content-wrapper{background:#111a2e;color:var(--txt);border:1px solid var(--stroke);border-radius:12px}
  .leaflet-popup-tip{background:#111a2e;border:1px solid var(--stroke)}
  .leaflet-popup-content{margin:11px 13px;font-size:13.5px;line-height:1.5}
  .pp b.t{font-size:15px}
  .pp .k{color:var(--muted)}
  .leaflet-control-zoom{border:0!important;box-shadow:0 2px 10px rgba(0,0,0,.5)}
  .leaflet-control-zoom a{background:#111a2e;color:#eaf0fb;border-color:var(--stroke)}
  .leaflet-bar a{width:34px;height:34px;line-height:34px}
  .leaflet-control-attribution{background:rgba(10,15,28,.7);color:#7f8db0}
  .leaflet-control-attribution a{color:#9fb2df}

  /* desktop: sheet flota como tarjeta abajo-izq */
  @media(min-width:721px){
    .sheet{left:14px;right:auto;bottom:14px;width:330px;border-radius:16px;border:1px solid var(--stroke)}
    .topbar h1{font-size:18px}
  }
</style>
</head>
<body>
<div id="map"></div>
<div class="topbar"><span class="mk"></span><h1>Congregación Este, SF</h1></div>

<div class="sheet">
  <div class="seg">
    <button id="mTerr" class="on">Territorios</button>
    <button id="mMet">Métrica</button>
  </div>
  <div id="legend" class="legend"></div>
  <div class="rowlbls">
    <span>Con dato <b id="stA">0</b></span>
    <span>Sin registro <b id="stB">0</b></span>
  </div>
  <div class="note" id="note"></div>
</div>

var HUERFANOS = [];
var TODAY = "20/07/2026";

var map = L.map('map', {zoomControl:false, tap:true});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
  {maxZoom:20, attribution:'© OpenStreetMap © CARTO'}).addTo(map);

var mode = 'terr';

// ---- escala de frecuencia: verde (0/1) -> rojo (mas) ----
function colFreq(v){
  if(v<=0) return '#3a5f4f';   // sin registro (verde apagado)
  if(v===1) return '#2e9e5b';  // verde
  if(v===2) return '#9ccc3c';
  if(v===3) return '#f4c020';
  if(v===4) return '#f57c00';
  return '#d32f2f';            // 5+
}
function styleFor(f){
  if(mode==='met'){
    return {color:'rgba(255,255,255,.35)', weight:1, fillColor:colFreq(f.v), fillOpacity:.6};
  }
  // territorios: neutro
  return {color:'rgba(150,180,255,.55)', weight:1.2, fillColor:'#5b8cff', fillOpacity:.10};
}

function popupHTML(f){
  var h = '<div class="pp"><b class="t">'+f.t+'</b> · '+(f.b||'')+'<br>';
  if(f.v>0){
    h += '<span class="k">Veces predicado:</span> <b>'+f.v+'</b><br>'+
         '<span class="k">Última:</span> '+f.u+
         (f.d!==null?'<br><span class="k">Hace</span> <b>'+f.d+'</b> días':'');
  }else{
    h += '<span class="k">Sin registro</span>';
  }
  return h+'</div>';
}

// poligonos
var polys = [];
var layer = L.layerGroup().addTo(map);
FEATS.forEach(function(f){
  var pg = L.polygon(f.ring, styleFor(f));
  pg._f = f;
  pg.bindPopup(popupHTML(f), {closeButton:true});
  pg.on('click', function(){ this.openPopup(); });
  polys.push(pg); layer.addLayer(pg);
});

// labels (numero) - solo modo Territorios y con zoom suficiente
var labels = L.layerGroup();
FEATS.forEach(function(f){
  var m = L.marker(f.c, {interactive:false, icon:L.divIcon({className:'tlabel', html:f.t,
    iconSize:[30,14], iconAnchor:[15,7]})});
  labels.addLayer(m);
});
function refreshLabels(){
  var show = (mode==='terr') && map.getZoom() >= 14;
  if(show){ if(!map.hasLayer(labels)) labels.addTo(map); }
  else { if(map.hasLayer(labels)) map.removeLayer(labels); }
}
map.on('zoomend', refreshLabels);

// ---- leyenda / stats / nota ----
function drawLegend(){
  var el = document.getElementById('legend');
  if(mode==='met'){
    el.innerHTML = '<div class="legwrap"><div class="bar"></div></div>'+
      '<div class="ends"><span>sin registro / 1</span><span>más veces</span></div>';
    document.getElementById('note').innerHTML =
      'Color por <b>veces predicado</b>, contenido en cada territorio. Hoy casi todo = 1; '+
      'se diferencia al cargar más pasadas. Ref: '+TODAY+'.';
  }else{
    el.innerHTML = '';
    document.getElementById('note').innerHTML =
      'Tocá un territorio para ver <b>veces</b>, <b>última vez</b> y barrio. Acercá para ver los números.';
  }
}
function setMode(m){
  mode = m;
  document.getElementById('mTerr').className = m==='terr'?'on':'';
  document.getElementById('mMet').className  = m==='met'?'on':'';
  polys.forEach(function(pg){ pg.setStyle(styleFor(pg._f)); });
  drawLegend(); refreshLabels();
}
document.getElementById('mTerr').onclick = function(){ setMode('terr'); };
document.getElementById('mMet').onclick  = function(){ setMode('met'); };

document.getElementById('stA').textContent = FEATS.filter(function(f){return f.v>0;}).length;
document.getElementById('stB').textContent = FEATS.filter(function(f){return f.v===0;}).length;

// encuadre
var all = [];
FEATS.forEach(function(f){ f.ring.forEach(function(p){ all.push(p); }); });
map.fitBounds(L.latLngBounds(all), {padding:[40,40]});

setMode('terr');
if(HUERFANOS.length){ console.warn('IDs en Excel sin polígono:', HUERFANOS.join(', ')); }
</script>
