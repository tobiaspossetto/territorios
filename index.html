<head>

<script>(function(){try{var t=localStorage.getItem('theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  /* ---- tokens: dark por defecto ---- */
  :root{
    --ground:#0a0f1c; --sheet:rgba(14,20,34,.86); --stroke:rgba(255,255,255,.12);
    --txt:#eaf0fb; --muted:#93a1bd; --accent:#5b8cff; --pop:#111a2e;
    --topfade:rgba(10,15,28,.92); --shadow:0 6px 20px rgba(0,0,0,.4);
  }
  :root[data-theme="light"]{
    --ground:#eceae1; --sheet:rgba(250,249,244,.9); --stroke:rgba(20,30,60,.16);
    --txt:#1b2433; --muted:#5a667e; --accent:#3b6ef0; --pop:#ffffff;
    --topfade:rgba(236,234,225,.94); --shadow:0 6px 20px rgba(60,70,90,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;max-width:100%;background:var(--ground);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;overflow:hidden;overflow-x:hidden}
  #map{position:fixed;inset:0;height:100dvh;width:100%;background:var(--ground)}
  .leaflet-container{background:var(--ground)}

  /* tinte del basemap segun tema */
  :root[data-theme="dark"]  .leaflet-tile-pane{filter:brightness(1.06) contrast(1) sepia(.5) hue-rotate(188deg) saturate(1.8)}
  :root[data-theme="light"] .leaflet-tile-pane{filter:sepia(.30) saturate(.8) brightness(1.02) contrast(1.03)}

  /* titulo */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:800;display:flex;align-items:center;gap:9px;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background:linear-gradient(180deg,var(--topfade),transparent);pointer-events:none}
  .mk{width:26px;height:26px;border-radius:7px;flex:none;
    background:radial-gradient(circle at 32% 30%,#ffe08a,#ff8a3c 45%,#e01e63 78%);box-shadow:var(--shadow)}
  img.mk{background:none;object-fit:contain;box-shadow:none}
  .topbar h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
  :root[data-theme="dark"] .topbar h1{text-shadow:0 1px 8px rgba(0,0,0,.6)}
  .theme-btn{margin-left:auto;width:42px;height:42px;border-radius:12px;border:1px solid var(--stroke);
    background:var(--sheet);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    color:var(--txt);font-size:19px;cursor:pointer;pointer-events:auto;box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;line-height:1}

  /* bottom sheet */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:800;
    padding:14px 14px calc(env(safe-area-inset-bottom) + 14px);
    background:var(--sheet);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-top:1px solid var(--stroke);border-radius:18px 18px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.35)}
  .seg{display:flex;background:rgba(128,140,170,.14);border-radius:12px;padding:4px;gap:4px}
  .seg button{flex:1;min-height:44px;border:0;background:transparent;color:var(--muted);
    border-radius:9px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s}
  .seg button.on{background:linear-gradient(135deg,#3b6ef0,#5b8cff);color:#fff;box-shadow:0 4px 14px rgba(59,110,240,.4)}
  .legend{margin-top:12px}
  .bar{height:12px;border-radius:7px;
    background:linear-gradient(90deg,#3a5f4f,#2e9e5b,#9ccc3c,#f4c020,#f57c00,#d32f2f)}
  :root[data-theme="light"] .bar{background:linear-gradient(90deg,#6a8f7d,#2e9e5b,#9ccc3c,#f4c020,#f57c00,#d32f2f)}
  .legend .ends{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px}
  .rowlbls{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12.5px;color:var(--muted)}
  .rowlbls b{color:var(--txt);font-variant-numeric:tabular-nums}
  .note{font-size:11.5px;color:var(--muted);line-height:1.4;margin-top:10px}

  .tlabel{font-size:11px;font-weight:700;pointer-events:none;white-space:nowrap}
  :root[data-theme="dark"]  .tlabel{color:#eaf0fb;text-shadow:0 0 3px #000,0 0 3px #000}
  :root[data-theme="light"] .tlabel{color:#1b2433;text-shadow:0 0 3px #fff,0 0 3px #fff}

  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--pop);color:var(--txt);border:1px solid var(--stroke)}
  .leaflet-popup-content-wrapper{border-radius:12px}
  .leaflet-popup-content{margin:11px 13px;font-size:13.5px;line-height:1.5}
  .pp b.t{font-size:15px}
  .pp .k{color:var(--muted)}
  .leaflet-control-zoom{border:0!important;box-shadow:var(--shadow)}
  .leaflet-control-zoom a{background:var(--pop);color:var(--txt);border-color:var(--stroke)}
  .leaflet-bar a{width:34px;height:34px;line-height:34px}
  .leaflet-control-attribution{background:var(--sheet);color:var(--muted)}
  .leaflet-control-attribution a{color:var(--accent)}

  @media(min-width:721px){
    .sheet{left:14px;right:auto;bottom:14px;width:330px;border-radius:16px;border:1px solid var(--stroke)}
    .topbar h1{font-size:18px}
  }
</style>
</head>

  var h = '<div class="pp"><b class="t">'+f.t+'</b> · '+(f.b||'')+'<br>';
  if(f.v>0){
    h += '<span class="k">Veces completado:</span> <b>'+f.v+'</b><br>'+
         '<span class="k">Último cierre:</span> '+f.u+
         (f.d!==null?'<br><span class="k">Hace</span> <b>'+f.d+'</b> días':'');
  }else{ h += '<span class="k">Sin registro</span>'; }
  return h+'</div>';
}

var polys = [];
var layer = L.layerGroup().addTo(map);
FEATS.forEach(function(f){
  var pg = L.polygon(f.ring, styleFor(f));
  pg._f = f;
  pg.bindPopup(popupHTML(f), {closeButton:true});
  pg.on('click', function(){ this.openPopup(); });
  polys.push(pg); layer.addLayer(pg);
});

var labels = L.layerGroup();
FEATS.forEach(function(f){
  labels.addLayer(L.marker(f.c, {interactive:false,
    icon:L.divIcon({className:'tlabel', html:f.t, iconSize:[30,14], iconAnchor:[15,7]})}));
});
function refreshLabels(){
  var show = (mode==='terr') && map.getZoom() >= 14;
  if(show){ if(!map.hasLayer(labels)) labels.addTo(map); }
  else if(map.hasLayer(labels)) map.removeLayer(labels);
}
map.on('zoomend', refreshLabels);

function drawLegend(){
  var el = document.getElementById('legend');
  if(mode==='met'){
    el.innerHTML = '<div class="bar"></div>'+
      '<div class="ends"><span>sin registro / 1</span><span>más veces</span></div>';
    document.getElementById('note').innerHTML =
      'Color por <b>veces completado</b> (Inicio+Fin), contenido en cada territorio. '+
      'Se intensifica al acumular pasadas cerradas. Ref: '+TODAY+'.';
  }else{
    el.innerHTML = '';
    document.getElementById('note').innerHTML =
      'Tocá un territorio para ver <b>veces</b>, <b>última vez</b> y barrio. Acercá para ver los números.';
  }
}
function setMode(m){
  mode = m;
  document.getElementById('mTerr').className = m==='terr'?'on':'';
  document.getElementById('mMet').className  = m==='met'?'on':'';
  polys.forEach(function(pg){ pg.setStyle(styleFor(pg._f)); });
  drawLegend(); refreshLabels();
}
document.getElementById('mTerr').onclick = function(){ setMode('terr'); };
document.getElementById('mMet').onclick  = function(){ setMode('met'); };

function applyTheme(t){
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  baseLayer.setUrl(tileUrl(THEMES[t].tiles));
  polys.forEach(function(pg){ pg.setStyle(styleFor(pg._f)); });
  document.getElementById('themeBtn').textContent = (t==='dark') ? '☀️' : '🌙';
  try{ localStorage.setItem('theme', t); }catch(e){}
}
document.getElementById('themeBtn').textContent = (theme==='dark') ? '☀️' : '🌙';
document.getElementById('themeBtn').onclick = function(){ applyTheme(theme==='dark'?'light':'dark'); };

document.getElementById('stA').textContent = FEATS.filter(function(f){return f.v>0;}).length;
document.getElementById('stB').textContent = FEATS.filter(function(f){return f.v===0;}).length;

var all = [];
FEATS.forEach(function(f){ f.ring.forEach(function(p){ all.push(p); }); });
map.fitBounds(L.latLngBounds(all), {padding:[40,40]});

setMode('terr');
if(HUERFANOS.length){ console.warn('IDs en Excel sin polígono:', HUERFANOS.join(', ')); }
</script>
</body>
</html>
